<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#111827"/>

  <!-- Gear outer -->
  <g fill="white">
    <circle cx="50" cy="50" r="18"/>
    
    <!-- Center hole -->
    <circle cx="50" cy="50" r="8" fill="#111827"/>
    
    <!-- Teeth -->
    <rect x="48" y="12" width="4" height="10"/>
    <rect x="48" y="78" width="4" height="10"/>
    <rect x="12" y="48" width="10" height="4"/>
    <rect x="78" y="48" width="10" height="4"/>
    
    <rect x="22" y="22" width="6" height="4" transform="rotate(45 25 24)"/>
    <rect x="72" y="22" width="6" height="4" transform="rotate(-45 75 24)"/>
    <rect x="22" y="74" width="6" height="4" transform="rotate(-45 25 76)"/>
    <rect x="72" y="74" width="6" height="4" transform="rotate(45 75 76)"/>
  </g>
</svg>